<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Fraud Detection Dashboard</title>

    <!-- Dependencies via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- UI Aesthetics / Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.05), transparent 25%);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .textarea-editor {
            background: rgba(15, 23, 42, 0.8);
            color: #38bdf8;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            height: 100%;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
            line-height: 1.5;
            font-size: 0.875rem;
        }

        .textarea-editor:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .textarea-editor::-webkit-scrollbar {
            width: 8px;
        }

        .textarea-editor::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }

        .textarea-editor::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 4px;
        }

        .heatmap-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .heatmap-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .heatmap-card:hover::after {
            opacity: 1;
        }

        .heatmap-card.safe {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(20, 83, 45, 0.3));
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .heatmap-card.danger {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(127, 29, 29, 0.4));
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
        }

        .heatmap-card.warning {
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.1), rgba(113, 63, 18, 0.3));
            border-color: rgba(234, 179, 8, 0.3);
            color: #facc15;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            outline: none;
        }

        /* Custom scrollbar for right panel */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
    </style>
</head>

<body class="p-6 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="mb-6 flex justify-between items-end shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white">
                    Fraud Engine <span class="text-slate-500 font-light">| Streamlit Embed</span>
                </h1>
            </div>
            <p class="text-slate-400 text-sm ml-11">Graph Theory & Five Cs of Credit Visualizer</p>
        </div>
        <div id="status-badge"
            class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all duration-300 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-current animate-pulse"></div>
            <span>System Initializing</span>
        </div>
    </header>

    <!-- Main Content Layout -->
    <div class="flex-1 flex gap-6 overflow-hidden">

        <!-- Left Side: Live Data Config -->
        <div class="w-[35%] flex flex-col glass-panel p-5 relative overflow-hidden group">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-cyan-400 opacity-50"></div>
            <h2 class="text-sm tracking-widest text-slate-400 uppercase font-semibold mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                Payload Editor (JSON)
            </h2>
            <div class="flex-1 relative">
                <textarea id="json-input" class="textarea-editor" spellcheck="false"></textarea>
                <div id="json-error"
                    class="absolute bottom-4 right-4 bg-red-900/90 text-red-200 text-xs px-3 py-2 rounded-md border border-red-700/50 hidden shadow-xl backdrop-blur-sm">
                    Invalid JSON Format
                </div>
            </div>
        </div>

        <!-- Right Side: Dashboard Core -->
        <div class="w-[65%] flex flex-col gap-6 overflow-y-auto custom-scrollbar pr-2 pb-2">

            <!-- Top Row: Heatmap & Score -->
            <div class="glass-panel p-5 relative">
                <div class="absolute top-0 right-0 p-3 opacity-20 pointer-events-none">
                    <svg class="w-24 h-24 text-slate-100" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>

                <h2 class="text-sm tracking-widest text-slate-400 uppercase font-semibold mb-4">The Five Cs Heatmap</h2>

                <div class="grid grid-cols-6 gap-4">
                    <!-- 5 Cs Dynamic Container -->
                    <div id="heatmap-container" class="col-span-5 grid grid-cols-5 gap-3">
                        <!-- Filled by JS -->
                    </div>

                    <!-- Trust Score Gauge -->
                    <div
                        class="glass-panel p-3 flex flex-col items-center justify-center relative col-span-1 border-slate-700/50">
                        <h3
                            class="font-bold text-[9px] tracking-widest uppercase text-slate-400 absolute top-3 w-full text-center">
                            Trust Index</h3>
                        <div class="relative w-full h-16 mt-6">
                            <canvas id="risk-chart"></canvas>
                            <div
                                class="absolute bottom-[-10px] left-0 w-full text-center flex items-end justify-center">
                                <span id="risk-score-value"
                                    class="text-3xl font-bold font-mono tracking-tighter">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Row: Force Directed Network -->
            <div class="glass-panel p-5 flex-1 flex flex-col min-h-[450px] relative">
                <div class="flex justify-between items-center mb-4 z-10">
                    <h2 class="text-sm tracking-widest text-slate-400 uppercase font-semibold">Entity Network & Flow
                    </h2>
                    <div id="fraud-alert"
                        class="hidden flex items-center gap-2 px-3 py-1.5 rounded-md bg-red-500/20 border border-red-500/50 text-red-400 text-xs font-bold uppercase tracking-wide animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.3)] backdrop-blur-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                            </path>
                        </svg>
                        Circular Trading Identified
                    </div>
                </div>
                <!-- Network Container -->
                <div
                    class="flex-1 bg-slate-900/40 rounded-xl relative overflow-hidden border border-slate-800/50 shadow-inner">
                    <div id="mynetwork"></div>
                    <div
                        class="absolute bottom-4 left-4 flex gap-3 text-[10px] tracking-wider uppercase text-slate-500 bg-slate-900/80 px-3 py-2 rounded-lg backdrop-blur-md border border-slate-800">
                        <div class="flex items-center gap-1"><span
                                class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span> Standard Node</div>
                        <div class="flex items-center gap-1"><span
                                class="w-2 h-2 rounded-full bg-red-500 inline-block animate-pulse"></span> Fraudulent
                            Edge</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /**
         * DEFAULT MOCK DATA
         */
        const defaultData = {
            "metrics": {
                "cash_flow": 15000,
                "revenue": 100000,
                "debt": 80000,
                "collateral_value": 50000,
                "market_conditions_index": 0.8
            },
            "transactions": [
                { "from": "Company A", "to": "Company B", "amount": 50000 },
                { "from": "Company B", "to": "Company C", "amount": 45000 },
                { "from": "Company C", "to": "Company A", "amount": 40000 },
                { "from": "Company C", "to": "Company D", "amount": 10000 },
                { "from": "Company E", "to": "Company F", "amount": 20000 }
            ]
        };

        // Initialize Editor
        const inputEl = document.getElementById('json-input');
        const errorEl = document.getElementById('json-error');
        inputEl.value = JSON.stringify(defaultData, null, 2);

        // Core App State
        let network = null;
        let chartInstance = null;

        // Listen for live edits
        inputEl.addEventListener('input', () => {
            try {
                const data = JSON.parse(inputEl.value);
                errorEl.classList.add('hidden');
                inputEl.style.borderColor = '';
                processData(data);
            } catch (e) {
                // Invalid JSON - subtle visual feedback
                errorEl.classList.remove('hidden');
                inputEl.style.borderColor = 'rgba(239, 68, 68, 0.5)';
            }
        });

        /**
         * DFS CYCLE DETECTION ALGORITHM (Directed Graph)
         */
        function detectCycles(nodes, edges) {
            const adj = {};
            nodes.forEach(n => adj[n.id] = []);
            edges.forEach(e => {
                if (!adj[e.from]) adj[e.from] = [];
                adj[e.from].push({ to: e.to, edgeId: e.id });
            });

            const cycleEdges = new Set();
            let hasCycle = false;

            // 0=unvisited, 1=visiting, 2=visited
            const state = {};
            nodes.forEach(n => state[n.id] = 0);

            nodes.forEach(startNode => {
                if (state[startNode.id] === 0) {
                    const branchNodes = [];
                    const branchEdges = [];

                    function dfs(nodeId) {
                        state[nodeId] = 1; // visiting
                        branchNodes.push(nodeId);

                        for (const neighbor of (adj[nodeId] || [])) {
                            branchEdges.push(neighbor.edgeId);

                            if (state[neighbor.to] === 0) {
                                dfs(neighbor.to);
                            } else if (state[neighbor.to] === 1) {
                                // Cycle detected: back edge to a node currently being visited
                                hasCycle = true;
                                const cycleStartIdx = branchNodes.indexOf(neighbor.to);
                                if (cycleStartIdx !== -1) {
                                    for (let i = cycleStartIdx; i < branchEdges.length; i++) {
                                        cycleEdges.add(branchEdges[i]);
                                    }
                                }
                            }
                            branchEdges.pop();
                        }

                        state[nodeId] = 2; // fully visited
                        branchNodes.pop();
                    }

                    dfs(startNode.id);
                }
            });

            return { hasCycle, cycleEdges: Array.from(cycleEdges) };
        }

        /**
         * COMPONENT UPDATERS
         */
        function updateFiveCs(metrics, hasCycle) {
            const cs = [
                {
                    name: "Character",
                    desc: "Trading Behavior",
                    status: hasCycle ? 'danger' : 'safe',
                    valText: hasCycle ? "Circular Fraud" : "Clean Flow"
                },
                {
                    name: "Capacity",
                    desc: "Free Cash Flow",
                    status: (metrics.cash_flow < 20000) ? 'danger' : ((metrics.cash_flow < 40000) ? 'warning' : 'safe'),
                    valText: "$" + (metrics.cash_flow || 0).toLocaleString()
                },
                {
                    name: "Capital",
                    desc: "Revenue vs Debt",
                    status: (metrics.revenue < metrics.debt) ? 'danger' : 'safe',
                    valText: "Rev $" + ((metrics.revenue || 0) / 1000) + 'k'
                },
                {
                    name: "Collateral",
                    desc: "Asset Backing",
                    status: (metrics.collateral_value < (metrics.debt || 1) * 0.8) ? 'danger' : 'safe',
                    valText: "LTV " + Math.round((metrics.debt || 0) / (metrics.collateral_value || 1) * 100) + "%"
                },
                {
                    name: "Conditions",
                    desc: "Market Index",
                    status: (metrics.market_conditions_index < 0.5) ? 'danger' : ((metrics.market_conditions_index < 0.8) ? 'warning' : 'safe'),
                    valText: "Idx " + (metrics.market_conditions_index || 0).toFixed(2)
                }
            ];

            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';

            cs.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = `heatmap-card p-3 border rounded-xl flex flex-col justify-between ${c.status}`;
                div.style.animation = `fadeIn 0.3s ease-out ${i * 0.05}s both`;

                let icon = '';
                if (c.status === 'safe') icon = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                if (c.status === 'warning') icon = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
                if (c.status === 'danger') icon = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

                div.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-[11px] tracking-widest uppercase opacity-90">${c.name}</h3>
                            <span class="opacity-80">${icon}</span>
                        </div>
                        <p class="text-[9px] opacity-60 uppercase tracking-widest leading-tight">${c.desc}</p>
                    </div>
                    <div class="font-mono text-sm font-bold mt-2 whitespace-nowrap overflow-hidden text-ellipsis">${c.valText}</div>
                `;
                container.appendChild(div);
            });

            // Update gauge based on aggregated risk
            updateRiskChart(cs);
        }

        function updateRiskChart(csArray) {
            let riskPoints = 0;
            csArray.forEach(c => {
                if (c.status === 'danger') riskPoints += 25;
                if (c.status === 'warning') riskPoints += 10;
            });

            // Score out of 100. Lower is worse.
            const score = Math.max(0, 100 - riskPoints);

            let color = '#4ade80'; // safe
            if (score <= 75) color = '#facc15'; // warn
            if (score <= 50) color = '#ef4444'; // danger

            const ctx = document.getElementById('risk-chart').getContext('2d');

            if (chartInstance) {
                chartInstance.data.datasets[0].data = [score, 100 - score];
                chartInstance.data.datasets[0].backgroundColor = [color, 'rgba(30, 41, 59, 0.5)'];
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Trust', 'Risk'],
                        datasets: [{
                            data: [score, 100 - score],
                            backgroundColor: [color, 'rgba(30, 41, 59, 0.5)'],
                            borderWidth: 0,
                            circumference: 180,
                            rotation: 270,
                            cutout: '80%'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 800, easing: 'easeOutQuart' },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        }
                    }
                });
            }

            const scoreEl = document.getElementById('risk-score-value');
            scoreEl.innerText = score;
            scoreEl.style.color = color;

            // Make text pulse if dangerous
            if (score <= 50) scoreEl.classList.add('animate-pulse');
            else scoreEl.classList.remove('animate-pulse');
        }

        /**
         * MAIN PIPELINE
         */
        function processData(data) {
            const txs = data.transactions || [];
            const metrics = data.metrics || {};

            // 1. Build Graph Nodes & Edges
            const nodesMap = new Map();
            const edgesList = [];

            txs.forEach((tx, index) => {
                if (!nodesMap.has(tx.from)) nodesMap.set(tx.from, { id: tx.from, label: tx.from });
                if (!nodesMap.has(tx.to)) nodesMap.set(tx.to, { id: tx.to, label: tx.to });

                edgesList.push({
                    id: 'edge_' + index,
                    from: tx.from,
                    to: tx.to,
                    label: '$' + (tx.amount || 0).toLocaleString(),
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } },
                    color: { color: 'rgba(100, 116, 139, 0.5)', highlight: '#94a3b8' },
                    font: { align: 'top', color: '#94a3b8', size: 11, background: 'transparent' },
                    width: 1.5,
                    smooth: { type: 'dynamic', roundness: 0.2 }
                });
            });

            const nodesList = Array.from(nodesMap.values());

            // 2. Cycle Detection
            const { hasCycle, cycleEdges } = detectCycles(nodesList, edgesList);

            // 3. Apply Node/Edge Aesthetics based on fraud results
            edgesList.forEach(edge => {
                if (cycleEdges.includes(edge.id)) {
                    // Turn RED for cycle
                    edge.color = { color: '#ef4444', highlight: '#f87171' };
                    edge.width = 3;
                    edge.font.color = '#ef4444';
                    edge.font.background = 'rgba(239, 68, 68, 0.1)';
                }
            });

            nodesList.forEach(node => {
                node.shape = 'dot';
                node.size = 18;
                node.font = { color: '#e2e8f0', size: 12, face: 'Inter' };
                node.borderWidth = 2;

                // Determine if node is involved in fraud for styling
                const isFraudster = edgesList.some(e => cycleEdges.includes(e.id) && (e.from === node.id || e.to === node.id));

                if (isFraudster) {
                    node.color = {
                        background: '#7f1d1d',
                        border: '#ef4444',
                        highlight: { border: '#f87171', background: '#991b1b' }
                    };
                    node.shadow = { enabled: true, color: 'rgba(239, 68, 68, 0.4)', size: 15 };
                } else {
                    node.color = {
                        background: '#1e293b',
                        border: '#38bdf8',
                        highlight: { border: '#7dd3fc', background: '#0284c7' }
                    };
                    node.shadow = { enabled: true, color: 'rgba(56, 189, 248, 0.2)', size: 10 };
                }
            });

            // 4. Render or Update Network Graph
            const container = document.getElementById('mynetwork');
            const graphData = { nodes: new vis.DataSet(nodesList), edges: new vis.DataSet(edgesList) };

            if (!network) {
                const options = {
                    physics: {
                        forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 100, springConstant: 0.08 },
                        maxVelocity: 50,
                        solver: 'forceAtlas2Based',
                        timestep: 0.35,
                        stabilization: { iterations: 150 }
                    },
                    interaction: { hover: true, tooltipDelay: 150, zoomView: true },
                    layout: { randomSeed: 42 } // For stable visuals if graph doesn't change
                };
                network = new vis.Network(container, graphData, options);
            } else {
                network.setData(graphData);
            }

            // 5. Update Status Based on Fraud Detection
            const alertEl = document.getElementById('fraud-alert');
            const statusBadge = document.getElementById('status-badge');

            if (hasCycle) {
                alertEl.classList.remove('hidden');
                statusBadge.className = "px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-2 bg-red-500/20 text-red-400 border border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.2)]";
                statusBadge.innerHTML = '<div class="w-2 h-2 rounded-full bg-red-400 animate-ping"></div><span>Critical Risk Alert</span>';
            } else {
                alertEl.classList.add('hidden');
                statusBadge.className = "px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-2 bg-green-500/20 text-green-400 border border-green-500/30 shadow-[0_0_10px_rgba(34,197,94,0.1)]";
                statusBadge.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-400"></div><span>System Normal</span>';
            }

            // 6. Regenerate 5 Cs Heatmap
            updateFiveCs(metrics, hasCycle);
        }

        // Add pure CSS Animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        `;
        document.head.appendChild(style);

        // Initial Boot
        processData(defaultData);

    </script>
</body>

</html>
